<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radiology Text Summariser</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Medical Text Summarization</title>
</head>
<body>
    <div id="root"></div>
    <h1>Medical Text Summarization</h1>
    <form method="post">
        <div class="container">
            <div class="d-flex gap-2 mb-4 overflow-auto">
                <div class="metric-card"><span>ROUGE-1</span><strong>0.537</strong></div>
                <div class="metric-card"><span>ROUGE-2</span><strong>0.449</strong></div>
                <div class="metric-card"><span>ROUGE-L</span><strong>0.535</strong></div>
            </div>

            <div class="card-ui">
                <div class="small fw-bold text-muted mb-2 text-uppercase" style="letter-spacing: 1px;">Clinical Findings</div>
                <textarea id="medical_text" name="medical_text" class="form-control mb-3" rows="4" placeholder="Paste findings paragraph..."></textarea>
                <button id="submit-btn" class="btn-ai shadow-sm d-flex align-items-center" type="submit">
                    <span id="submit-text">Summarize</span>
                    <span id="submit-spinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status" aria-hidden="true"></span>
                </button>
            </div>
    </form>
    {% if summary %}
            <div class="card-ui">
                <div class="small fw-bold text-muted mb-2 text-uppercase" style="letter-spacing: 1px;">AI Generated Impression</div>
                <div class="output-viewport">
                    <div id="findings" class="text-muted small italic">{{findings}}</div>
                </div>
                <div class="output-viewport">
                    <div id="summary" class="text-muted small italic">{{summary}}</div>
                </div>
            </div>
        </div>
    {% endif %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const form = document.querySelector('form');
        const submitBtn = document.getElementById('submit-btn');
        const submitSpinner = document.getElementById('submit-spinner');
        const submitText = document.getElementById('submit-text');

        if (form) {
            form.addEventListener('submit', () => {
                submitBtn.disabled = true;
                submitSpinner.classList.remove('d-none');
                submitText.textContent = 'Summarising...';
            });
        }
    </script>
</body>
</html>
